<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="referrer" content="no-referrer" />
  <title>__PAGE_TITLE__</title>
  <link rel="stylesheet" href="/h5/ui.css" />
  <script src="https://res.wx.qq.com/open/js/jweixin-1.6.0.js"></script>
</head>
<body class="h5-tool">
  <a class="h5-skip" href="#main">跳到主要内容</a>
  <div class="h5-wrap" id="main">
    <header class="h5-topbar">
      <div>
        <div class="h5-brand">辙见 · 工具</div>
        <h1 class="h5-page-title">__PAGE_H1__</h1>
        <p class="h5-page-desc" id="pageDesc">支持图片诊断、故障码诊断、症状诊断。无需填写技术参数，直接提交即可。</p>
      </div>
    </header>

    <div class="h5-notice" role="status">
      <span class="h5-notice__icon" aria-hidden="true">i</span>
      <div>
        <strong style="color:var(--text-primary)">专业提示</strong>：输出为 AI 辅助判断，用于风险提示与下一步建议；不构成保险定损、责任认定或维修合同。重要决策请以实车检测与正规维修厂意见为准。
      </div>
    </div>
    <div class="h5-notice h5-notice--neutral">
      <span class="h5-notice__icon" style="background:var(--text-secondary)" aria-hidden="true">·</span>
      <div>
        你提交的内容仅用于本次分析；请勿在文本中包含银行卡号、身份证号等敏感信息。图片诊断需填写可公网访问的图片链接。
      </div>
    </div>

    <section class="h5-card" id="inputCard" aria-labelledby="inputHeading">
      <h2 class="h5-card__title" id="inputHeading">开始诊断</h2>

      <div id="tabBar" class="h5-tabs" role="tablist" aria-label="诊断方式">
        <button type="button" class="h5-tab" role="tab" id="tabImage" aria-controls="panelImage" aria-selected="true">图片</button>
        <button type="button" class="h5-tab" role="tab" id="tabDtc" aria-controls="panelDtc" aria-selected="false">故障码</button>
        <button type="button" class="h5-tab" role="tab" id="tabSymptom" aria-controls="panelSymptom" aria-selected="false">症状</button>
      </div>

      <div id="panelImage" class="h5-panel is-active" role="tabpanel" aria-labelledby="tabImage">
        <label class="h5-label" for="imageUrls">图片链接（换行或英文逗号分隔）</label>
        <textarea id="imageUrls" class="h5-textarea" rows="3" placeholder="https://.../1.jpg, https://.../2.jpg"></textarea>
        <label class="h5-label" for="imageDesc">补充描述（可选）</label>
        <textarea id="imageDesc" class="h5-textarea" rows="2" placeholder="例如：低速追尾，前杠凹陷"></textarea>
        <div class="h5-actions">
          <button type="button" class="h5-btn h5-btn--primary" id="btnImageDiag">开始图片诊断</button>
        </div>
      </div>

      <div id="panelDtc" class="h5-panel" role="tabpanel" aria-labelledby="tabDtc" hidden>
        <label class="h5-label" for="dtcCode">DTC 故障码</label>
        <input id="dtcCode" class="h5-input" placeholder="例如：P0300" autocomplete="off" />
        <div class="h5-actions">
          <button type="button" class="h5-btn h5-btn--ghost" id="btnDtcDiag">开始故障码诊断</button>
        </div>
      </div>

      <div id="panelSymptom" class="h5-panel" role="tabpanel" aria-labelledby="tabSymptom" hidden>
        <label class="h5-label" for="symptomText">症状描述</label>
        <textarea id="symptomText" class="h5-textarea" rows="3" placeholder="例如：怠速抖动，发动机故障灯亮"></textarea>
        <div class="h5-actions">
          <button type="button" class="h5-btn h5-btn--ghost" id="btnSymptomDiag">开始症状诊断</button>
        </div>
      </div>
    </section>

    <section class="h5-card h5-hidden" id="resultCard" aria-live="polite">
      <div id="resultHead"></div>
      <div id="resultBody"></div>
      <div class="h5-share-line">
        <input id="shareLink" class="h5-input" readonly placeholder="诊断结果分享链接会显示在这里" aria-label="分享链接" />
        <button type="button" class="h5-btn h5-btn--ghost" id="btnCopyShare">复制链接</button>
      </div>
      <p class="h5-muted" id="resultDisclaimer"></p>
    </section>
  </div>

  <div id="resultDock" class="h5-dock h5-hidden" aria-label="下一步操作">
    <div class="h5-dock__inner">
      <div id="wxLaunchWrap" class="h5-wx-launch-host h5-hidden">
        <wx-open-launch-weapp id="wxLaunch" username="__WEAPP_ORIGINAL_ID__" path="/pages/damage/upload/index">
          <script type="text/wxtag-template">
            <style>
              .wxbtn{display:flex;align-items:center;justify-content:center;min-height:48px;border-radius:12px;background:#2563eb;color:#fff;font-weight:700;font-size:15px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}
            </style>
            <div class="wxbtn">获取维修商报价（打开小程序）</div>
          </script>
        </wx-open-launch-weapp>
      </div>
      <button type="button" class="h5-btn h5-btn--primary h5-btn--block" id="fallbackOpen">获取维修商报价（打开小程序）</button>
      <p class="h5-dock__hint" id="dockHint">在微信内打开本页可使用一键拉起小程序；其他环境请复制链接到微信中打开。</p>
    </div>
  </div>

  <script>
    const isWechat = /MicroMessenger/i.test(navigator.userAgent || '');
    const searchParams = new URLSearchParams(location.search);
    const sourceChannel = (searchParams.get('src') || 'direct').trim() || 'direct';
    const cid = (searchParams.get('cid') || '').trim();
    const kw = (searchParams.get('kw') || '').trim();
    const weappPath = '/pages/damage/upload/index?from=h5_diagnosis&src=' + encodeURIComponent(sourceChannel);
    const entry = (function inferEntry() {
      const p = location.pathname || '';
      if (/\/h5\/diagnosis\/dtc\/?$/.test(p)) return 'dtc';
      if (/\/h5\/diagnosis\/symptom\/?$/.test(p)) return 'symptom';
      return (searchParams.get('entry') || '').trim() || 'all';
    })();

    function setBodyDock(on) {
      if (on) document.body.classList.add('h5-has-dock');
      else document.body.classList.remove('h5-has-dock');
    }

    (function applyEntryMode() {
      const tabBar = document.getElementById('tabBar');
      const tabImage = document.getElementById('tabImage');
      const tabDtc = document.getElementById('tabDtc');
      const tabSymptom = document.getElementById('tabSymptom');
      const panelImage = document.getElementById('panelImage');
      const panelDtc = document.getElementById('panelDtc');
      const panelSymptom = document.getElementById('panelSymptom');
      const desc = document.getElementById('pageDesc');

      function activateTab(which) {
        const tabs = { image: tabImage, dtc: tabDtc, symptom: tabSymptom };
        const panels = { image: panelImage, dtc: panelDtc, symptom: panelSymptom };
        Object.keys(tabs).forEach((k) => {
          const tb = tabs[k];
          const p = panels[k];
          if (!tb || !p) return;
          const on = k === which;
          tb.setAttribute('aria-selected', on ? 'true' : 'false');
          if (on) {
            p.classList.add('is-active');
            p.removeAttribute('hidden');
          } else {
            p.classList.remove('is-active');
            p.setAttribute('hidden', 'hidden');
          }
        });
      }

      if (entry === 'dtc') {
        if (tabBar) tabBar.classList.add('h5-hidden');
        if (panelImage) {
          panelImage.classList.remove('is-active');
          panelImage.setAttribute('hidden', 'hidden');
        }
        if (panelSymptom) {
          panelSymptom.classList.remove('is-active');
          panelSymptom.setAttribute('hidden', 'hidden');
        }
        if (panelDtc) {
          panelDtc.classList.add('is-active');
          panelDtc.removeAttribute('hidden');
        }
        if (desc) desc.textContent = '输入故障码（如 P0300），快速了解含义、风险提示与下一步建议。';
      } else if (entry === 'symptom') {
        if (tabBar) tabBar.classList.add('h5-hidden');
        if (panelImage) {
          panelImage.classList.remove('is-active');
          panelImage.setAttribute('hidden', 'hidden');
        }
        if (panelDtc) {
          panelDtc.classList.remove('is-active');
          panelDtc.setAttribute('hidden', 'hidden');
        }
        if (panelSymptom) {
          panelSymptom.classList.add('is-active');
          panelSymptom.removeAttribute('hidden');
        }
        if (desc) desc.textContent = '用一句话描述故障现象，获取风险提示与下一步检查建议。';
      } else {
        if (tabBar) tabBar.classList.remove('h5-hidden');
        activateTab('image');
        tabImage && tabImage.addEventListener('click', () => activateTab('image'));
        tabDtc && tabDtc.addEventListener('click', () => activateTab('dtc'));
        tabSymptom && tabSymptom.addEventListener('click', () => activateTab('symptom'));
      }
    })();

    (function setupLaunchPath() {
      const launch = document.getElementById('wxLaunch');
      if (launch) launch.setAttribute('path', weappPath);
    })();

    async function track(action, extra) {
      try {
        await fetch('/api/v1/public/h5/track', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            tool: 'diagnosis-assistant',
            source: sourceChannel,
            action: String(action || ''),
            extra: {
              ...(extra && typeof extra === 'object' ? extra : {}),
              cid: cid || undefined,
              kw: kw || undefined,
              entry,
            },
          }),
        });
      } catch (_) {}
    }

    async function callPublic(path, body) {
      const r = await fetch(path, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body || {}),
      });
      const json = await r.json().catch(() => ({}));
      if (!r.ok || (json && json.code && json.code !== 200)) {
        throw new Error((json && json.message) || '请求失败');
      }
      return json.data || {};
    }

    function splitUrls(raw) {
      return String(raw || '').split(/[\n,]/g).map((x) => x.trim()).filter(Boolean);
    }

    function escapeHtml(s) {
      return String(s || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function severityBadge(sev) {
      const t = String(sev || '').trim() || '-';
      const low = /低|轻微|minor/i.test(t);
      const cls = low ? 'h5-badge h5-badge--ok' : 'h5-badge h5-badge--risk';
      return '<span class="' + cls + '">风险：' + escapeHtml(t) + '</span>';
    }

    function renderDiagResult(data) {
      const card = document.getElementById('resultCard');
      const dock = document.getElementById('resultDock');
      card.classList.remove('h5-hidden');
      if (dock) dock.classList.remove('h5-hidden');
      setBodyDock(true);

      const title = data.report_title || '损失报告（AI）';
      const conf = Math.round((data.confidence || 0) * 100);
      const range = Array.isArray(data.price_range) ? data.price_range.join(' - ') : '-';
      document.getElementById('resultHead').innerHTML =
        '<h2 class="h5-card__title" style="margin-top:0">' + escapeHtml(title) + '</h2>' +
        '<p class="h5-page-desc" style="margin-top:4px">' + escapeHtml(data.problem_summary || '诊断完成') + '</p>' +
        '<div class="h5-meta-row">' +
        severityBadge(data.severity) +
        '<span class="h5-badge h5-badge--muted">置信度 ' + conf + '%</span>' +
        '</div>' +
        '<div class="h5-kpi"><div class="h5-kpi__label">费用区间参考（含税与否以到店为准）</div><div class="h5-kpi__value">' + escapeHtml(range) + '</div></div>';

      const sections = Array.isArray(data.report_sections) ? data.report_sections : [];
      const obvious = sections.find((x) => x && x.key === 'obvious_damage');
      const possible = sections.find((x) => x && x.key === 'possible_damage');
      const repair = sections.find((x) => x && x.key === 'repair_advice');
      const obviousList = (obvious && Array.isArray(obvious.items) ? obvious.items : []).map((x) => '<li>' + escapeHtml(x) + '</li>').join('');
      const possibleList = (possible && Array.isArray(possible.items) ? possible.items : []).map((x) => '<li>' + escapeHtml(x) + '</li>').join('');
      const repairList = (repair && Array.isArray(repair.items) ? repair.items : []).map((x) => '<li>' + escapeHtml(x) + '</li>').join('');
      const notes = (data.safety_notes || []).map((x) => '<li>' + escapeHtml(x) + '</li>').join('');
      document.getElementById('resultBody').innerHTML =
        '<div class="h5-list-title">明显损伤</div><ul class="h5-ul">' + (obviousList || '<li>暂无明显可见损伤</li>') + '</ul>' +
        '<div class="h5-list-title">可能损伤</div><ul class="h5-ul">' + (possibleList || '<li>暂无待进一步确认项</li>') + '</ul>' +
        '<div class="h5-list-title">维修建议</div><ul class="h5-ul">' + (repairList || '<li>暂无专项建议</li>') + '</ul>' +
        '<div class="h5-list-title">安全提示</div><ul class="h5-ul">' + (notes || '<li>暂无</li>') + '</ul>';
      document.getElementById('resultDisclaimer').textContent = data.disclaimer || '';
      const shareUrl = new URL(location.href);
      shareUrl.searchParams.set('src', sourceChannel);
      document.getElementById('shareLink').value = shareUrl.toString();
      card.scrollIntoView({ behavior: 'smooth', block: 'start' });
      track('result_rendered', {
        severity: data.severity || '',
        confidence: Number(data.confidence || 0),
      });
    }

    function setLoading(btn, loading, label) {
      if (!btn) return;
      btn.disabled = !!loading;
      if (loading) {
        btn.dataset._old = btn.textContent;
        btn.textContent = label || '分析中…';
      } else if (btn.dataset._old) {
        btn.textContent = btn.dataset._old;
      }
    }

    async function setupWxOpenTag() {
      if (!isWechat || !window.wx) return false;
      try {
        const curUrl = location.href.split('#')[0];
        const r = await fetch('/api/v1/public/wechat/jssdk-config?url=' + encodeURIComponent(curUrl));
        const body = await r.json();
        if (!body || body.code !== 200 || !body.data) return false;
        const cfg = body.data;
        return await new Promise((resolve) => {
          window.wx.config({
            debug: false,
            appId: cfg.appId,
            timestamp: cfg.timestamp,
            nonceStr: cfg.nonceStr,
            signature: cfg.signature,
            jsApiList: [],
            openTagList: ['wx-open-launch-weapp'],
          });
          window.wx.ready(() => resolve(true));
          window.wx.error(() => resolve(false));
        });
      } catch (_) {
        return false;
      }
    }

    document.getElementById('btnImageDiag').addEventListener('click', async () => {
      const btn = document.getElementById('btnImageDiag');
      try {
        setLoading(btn, true);
        const urls = splitUrls(document.getElementById('imageUrls').value);
        const userDesc = (document.getElementById('imageDesc').value || '').trim();
        if (!urls.length) throw new Error('请先输入图片链接');
        const data = await callPublic('/api/v1/public/diagnosis/image-analyze', {
          images: urls,
          user_description: userDesc,
          source_channel: sourceChannel,
        });
        renderDiagResult(data);
        track('submit_image_diagnosis', { image_count: urls.length });
      } catch (e) {
        alert(e.message || '图片诊断失败');
      } finally {
        setLoading(btn, false);
      }
    });

    document.getElementById('btnDtcDiag').addEventListener('click', async () => {
      const btn = document.getElementById('btnDtcDiag');
      try {
        setLoading(btn, true);
        const code = (document.getElementById('dtcCode').value || '').trim();
        if (!code) throw new Error('请先输入故障码');
        const data = await callPublic('/api/v1/public/diagnosis/dtc-interpret', {
          dtc_code: code,
          source_channel: sourceChannel,
        });
        renderDiagResult(data);
        track('submit_dtc_diagnosis', { dtc_code: code });
      } catch (e) {
        alert(e.message || '故障码诊断失败');
      } finally {
        setLoading(btn, false);
      }
    });

    document.getElementById('btnSymptomDiag').addEventListener('click', async () => {
      const btn = document.getElementById('btnSymptomDiag');
      try {
        setLoading(btn, true);
        const text = (document.getElementById('symptomText').value || '').trim();
        if (!text) throw new Error('请先输入症状描述');
        const data = await callPublic('/api/v1/public/diagnosis/symptom-analyze', {
          symptom_text: text,
          source_channel: sourceChannel,
        });
        renderDiagResult(data);
        track('submit_symptom_diagnosis', { text_length: text.length });
      } catch (e) {
        alert(e.message || '症状诊断失败');
      } finally {
        setLoading(btn, false);
      }
    });

    document.getElementById('fallbackOpen').addEventListener('click', () => {
      const appId = '__WEAPP_APPID__';
      const path = weappPath;
      track('cta_open_miniapp_click', { is_wechat: isWechat });
      if (isWechat) {
        alert('若未自动拉起，请点击上方蓝色按钮「获取维修商报价」打开小程序。');
      } else {
        alert('请在微信内打开此页后再拉起小程序。\nAppID=' + appId + '\npath=' + path);
      }
    });

    document.getElementById('btnCopyShare').addEventListener('click', async () => {
      const input = document.getElementById('shareLink');
      const value = (input.value || '').trim();
      if (!value) {
        alert('请先完成一次诊断，再复制分享链接');
        return;
      }
      try {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          await navigator.clipboard.writeText(value);
        } else {
          input.focus();
          input.select();
          document.execCommand('copy');
        }
        alert('分享链接已复制');
        track('copy_share_link', { link_length: value.length });
      } catch (_) {
        alert('复制失败，请手动长按复制');
      }
    });

    setupWxOpenTag().then((ok) => {
      if (ok) {
        const wrap = document.getElementById('wxLaunchWrap');
        if (wrap) wrap.classList.remove('h5-hidden');
        const fb = document.getElementById('fallbackOpen');
        if (fb) fb.classList.add('h5-hidden');
        const hint = document.getElementById('dockHint');
        if (hint) hint.textContent = '点击上方按钮将打开「辙见」小程序，继续上传事故照片并获取多家维修商报价。';
      }
    });

    track('page_view', { is_wechat: isWechat, path: location.pathname });
  </script>
</body>
</html>
